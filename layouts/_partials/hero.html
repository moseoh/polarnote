<style>
  .hero-section {
    background: linear-gradient(135deg, #1e3a8a 0%, #3730a3 100%);
    color: white;
    padding: 60px 0;
    position: relative;
    overflow: hidden;
    max-width: 1200px;
    margin: 0 auto;
  }

  .hero-container {
    max-width: 1000px;
    margin: 0 auto;
    padding: 0 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .hero-content {
    flex: 1;
    max-width: 500px;
  }

  .hero-title {
    font-size: 3rem;
    font-weight: bold;
    margin-bottom: 1rem;
    line-height: 1.2;
  }

  .hero-description {
    font-size: 1.2rem;
    opacity: 0.9;
    margin-bottom: 2rem;
  }

  .hero-graphics {
    flex: 1;
    text-align: center;
    font-size: 4rem;
    position: relative;
  }

  .floating-icon {
    position: absolute;
    font-size: 2rem;
    opacity: 0.7;
    animation: float 3s ease-in-out infinite;
  }

  .floating-icon:nth-child(1) {
    top: 20%;
    left: 10%;
    animation-delay: 0s;
  }

  .floating-icon:nth-child(2) {
    top: 60%;
    right: 20%;
    animation-delay: 1s;
  }

  .floating-icon:nth-child(3) {
    bottom: 30%;
    left: 30%;
    animation-delay: 2s;
  }

  @keyframes float {
    0%,
    100% {
      transform: translateY(0px) rotate(0deg);
    }
    50% {
      transform: translateY(-20px) rotate(10deg);
    }
  }

  @media (max-width: 768px) {
    .hero-container {
      flex-direction: column;
      text-align: center;
    }

    .hero-title {
      font-size: 2rem;
    }

    .hero-graphics {
      margin-top: 2rem;
      font-size: 3rem;
    }
  }
</style>

<div class="hero-container">
  <div class="hero-content">
    <h1 class="hero-title">{{ site.Title }}</h1>
    <p class="hero-description">
      {{ with site.Params.description }}{{ . }}{{ else }} 혁신적인 기술과
      인사이트를 공유하는 개발자 블로그 {{ end }}
    </p>
  </div>

  <div class="hero-graphics">
    <div class="floating-icon">💻</div>
    <div class="floating-icon">☕</div>
    <div class="floating-icon">🚀</div>
    <div class="floating-icon">📊</div>
    <div class="floating-icon">💡</div>
    🌟
  </div>
</div>
