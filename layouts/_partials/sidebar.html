<style>
  .sidebar {
    padding: 20px 0;
  }

  .sidebar-widget {
    background: #f8f9fa;
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 24px;
  }

  .sidebar-widget h3 {
    font-size: 1.1rem;
    font-weight: bold;
    margin-bottom: 16px;
    color: #333;
  }

  .sidebar-post {
    display: flex;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid #e9ecef;
    text-decoration: none;
    color: inherit;
  }

  .sidebar-post:last-child {
    border-bottom: none;
  }

  .sidebar-post:hover {
    color: #0066ff;
  }

  .sidebar-post-image {
    width: 60px;
    height: 60px;
    background: #e9ecef;
    border-radius: 8px;
    margin-right: 12px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
  }

  .sidebar-post-content {
    flex: 1;
  }

  .sidebar-post-title {
    font-weight: 500;
    font-size: 0.9rem;
    line-height: 1.3;
    margin-bottom: 4px;
  }

  .sidebar-post-date {
    font-size: 0.8rem;
    color: #6c757d;
  }

  .category-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }

  .category-list li {
    margin-bottom: 8px;
  }

  .category-list a {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    text-decoration: none;
    color: #6c757d;
    font-size: 0.9rem;
  }

  .category-list a:hover {
    color: #0066ff;
  }

  .category-count {
    background: #e9ecef;
    color: #6c757d;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 0.8rem;
  }

  .tag-cloud {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 0;
    margin: 0;
    list-style: none;
  }

  .tag-cloud a {
    text-decoration: none;
    background: #e9ecef;
    color: #6c757d;
    padding: 6px 12px;
    border-radius: 16px;
    font-size: 0.9rem;
    transition: all 0.2s;
  }

  .tag-cloud a:hover,
  .tag-cloud a.active {
    background: #0066ff;
    color: white;
  }
</style>

<!-- 태그 섹션 -->
<div class="sidebar-widget">
  <h3>태그</h3>
  <div class="tag-cloud">
    {{ $currentURL := .Permalink }} {{ range site.Taxonomies.tags }}
    <a
      href="{{ .Page.Permalink }}"
      class="{{ if eq $currentURL .Page.Permalink }}active{{ end }}"
    >
      {{ .Page.Title }} ({{ .Count }})
    </a>
    {{ end }}
  </div>
</div>
